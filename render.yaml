services:
  - type: web
    name: uza-pap-pos
    runtime: python

    
    buildCommand: pip install -r requirements.txt && alembic upgrade head

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flex-pos-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "false"

      - key: FIRST_ADMIN_EMAIL
        value: admin@yourpharmacy.com

      - key: FIRST_ADMIN_NAME
        value: System Admin

      # FIX 2: FIRST_ADMIN_PASSWORD needs a value set manually in Render dashboard
      # sync: false means Render won't sync it from anywhere — you set it manually
      - key: FIRST_ADMIN_PASSWORD
        sync: false

      - key: MPESA_CONSUMER_KEY
        sync: false

      - key: MPESA_CONSUMER_SECRET
        sync: false

      - key: MPESA_SHORTCODE
        value: "174379"

      - key: MPESA_PASSKEY
        sync: false

      - key: MPESA_CALLBACK_URL
        value: https://uza-pap-pos.onrender.com/payments/mpesa/callback

      - key: MPESA_ENV
        value: sandbox

      # FIX 3: ALLOWED_ORIGINS must include your actual frontend URL
      # For now allow all during testing, tighten before production
      - key: ALLOWED_ORIGINS
        value: '["https://flex-pharmacy-pos.onrender.com","http://localhost:5500","http://127.0.0.1:5500"]'


      - key: APP_NAME
        value: "Flex Pharmacy POS"

      - key: APP_VERSION
        value: "1.0.0"

      - key: OPENFDA_API_KEY
        value: ""

databases:
  - name: flex-pos-db
    plan: free
    # FIX 5: Add region to match your database — avoids latency
    region: oregon